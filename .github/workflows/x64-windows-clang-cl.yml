name: x64-windows-clang-cl

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    timeout-minutes: 10
    runs-on: windows-latest
    strategy:
      matrix:
        BUILD_TYPE: [Debug, Release]
    steps:
    - uses: actions/checkout@v4
    - uses: ilammy/msvc-dev-cmd@v1
    - name: configure
      run: cmake -G Ninja -DCMAKE_BUILD_TYPE=${{matrix.BUILD_TYPE}} -DCMAKE_C_COMPILER=clang-cl -DCMAKE_CXX_COMPILER=clang-cl -DTMC_USE_HWLOC=OFF -DCMAKE_CXX_FLAGS='-Werror' -B build/${{matrix.BUILD_TYPE}} .
    - name: build
      run: cmake --build build/${{matrix.BUILD_TYPE}} --target tests
    - name: run tests
      run: ./build/${{matrix.BUILD_TYPE}}/tests/tests.exe
